version: '3.8'

services:
  kafka:
    image: apache/kafka:3.9.1
    ports:
      - "9092:9094"
    environment:
      CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka_data:/var/lib/kafka/data

  kafka-init:
    image: apache/kafka:3.9.1
    depends_on:
      - kafka
    command: >
      bash -ec "
        sleep 15 &&
        for topic in datos_crudos alertas_globales datos_filtrados; do
          /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1 --topic \"$$topic\";
        done &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list
      "

  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  spark:
    image: bitnami/spark:3.5.0
    ports:
      - "8080:8080"
      - "7077:7077"
    environment:
      SPARK_MODE: master
    volumes:
      - ./jobs:/jobs
      - ./ingesta:/ingesta

  cassandra:
    image: cassandra:5.0
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra

  zeppelin:
    image: apache/zeppelin:0.10.1
    ports:
      - "8081:8080"
    volumes:
      - ./zeppelin:/zeppelin/conf
      - ./jobs:/jobs

  nifi:
    image: apache/nifi:2.6.0
    environment:
      SINGLE_USER_CREDENTIALS_USERNAME: ${NIFI_USERNAME:-admin}
      SINGLE_USER_CREDENTIALS_PASSWORD: ${NIFI_PASSWORD:-Admin123456!}
    ports:
      - "8443:8443"

  airflow:
    image: apache/airflow:2.10.5-python3.10
    depends_on:
      - postgres
    command: standalone
    ports:
      - "8085:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      AIRFLOW__SMTP__SMTP_HOST: ${SMTP_HOST:-smtp-mail.outlook.com}
      AIRFLOW__SMTP__SMTP_PORT: ${SMTP_PORT:-587}
      AIRFLOW__SMTP__SMTP_USER: ${SMTP_USER:-logistica-alerts@outlook.com}
      AIRFLOW__SMTP__SMTP_PASSWORD: ${SMTP_PASSWORD:-CHANGE_ME}
      AIRFLOW__SMTP__SMTP_MAIL_FROM: ${SMTP_USER:-logistica-alerts@outlook.com}
    volumes:
      - ./airflow:/opt/airflow
      - ./jobs:/jobs
      - ./ingesta:/ingesta

volumes:
  postgres_data:
  cassandra_data:
  kafka_data:
  minio_data:
