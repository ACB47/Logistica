version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    ports:
      - "2181:2181"
    networks:
      - logistica-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - logistica-net

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - kafka
    command: >
      bash -c "
        cub kafka-ready -b kafka:29092 1 40 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 1 --replication-factor 1 --topic datos_crudos &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 1 --replication-factor 1 --topic alertas_globales
      "
    networks:
      - logistica-net

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - hdfs_data:/hadoop/dfs/name
    environment:
      CLUSTER_NAME: logistica-cluster
    networks:
      - logistica-net

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    depends_on:
      - namenode
    volumes:
      - hdfs_data:/hadoop/dfs/data
    environment:
      SERVICE_PRECONDITION: "http://namenode:9870"
    networks:
      - logistica-net

  cassandra:
    image: cassandra:4.1
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    networks:
      - logistica-net

  cassandra-init:
    image: python:3.10
    depends_on:
      - cassandra
    command: >
      bash -c "
        sleep 20 &&
        pip install cassandra-driver &&
        python -c 'from cassandra.cluster import Cluster; c=Cluster([\"cassandra\"]); s=c.connect(); s.execute(\"CREATE KEYSPACE IF NOT EXISTS logistica WITH replication = {\\\"class\\\": \\\"SimpleStrategy\\\", \\\"replication_factor\\\": 1}\"); s.set_keyspace(\"logistica\"); s.execute(\"CREATE TABLE IF NOT EXISTS ship_metrics (window_start timestamp, window_end timestamp, dest_port text, route_id text, avg_speed double, speed_std double, ship_count int, avg_lat double, avg_lon double, processed_at timestamp, PRIMARY KEY (dest_port, window_start))\"); s.execute(\"CREATE TABLE IF NOT EXISTS alert_metrics (window_start timestamp, window_end timestamp, region text, source text, avg_severity double, avg_confidence double, alert_count int, processed_at timestamp, PRIMARY KEY (region, window_start))\"); s.execute(\"CREATE TABLE IF NOT EXISTS ml_predictions (prediction_id timeuuid, ship_id text, dest_port text, predicted_delay_hours double, risk_category text, model_used text, confidence double, created_at timestamp, PRIMARY KEY (ship_id, created_at))\"); s.execute(\"CREATE TABLE IF NOT EXISTS route_alerts (alert_id timeuuid, dest_port text, risk_level text, risk_score double, severity int, recommendation text, email_sent boolean, created_at timestamp, PRIMARY KEY (dest_port, created_at))\"); print(\"Cassandra OK\")'
    networks:
      - logistica-net

  spark-master:
    image: bitnami/spark:3.5.0
    ports:
      - "8080:8080"
      - "7077:7077"
    environment:
      SPARK_MODE: master
    volumes:
      - ./jobs:/jobs
      - ./ingesta:/ingesta
    networks:
      - logistica-net

  spark-worker:
    image: bitnami/spark:3.5.0
    depends_on:
      - spark-master
    environment:
      SPARK_MODE: master
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    volumes:
      - ./jobs:/jobs
      - ./ingesta:/ingesta
    networks:
      - logistica-net

  zeppelin:
    image: apache/zeppelin:0.10.1
    ports:
      - "8081:8080"
    volumes:
      - ./zeppelin:/zeppelin/conf
      - ./jobs:/jobs
    networks:
      - logistica-net

  nifi:
    image: apache/nifi:1.21.0
    ports:
      - "8443:8443"
    networks:
      - logistica-net

  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - logistica-net

  airflow-webserver:
    image: puckel/docker-airflow:2.7.3
    depends_on:
      - kafka
      - spark-master
      - postgres
    ports:
      - "8085:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__SMTP__SMTP_HOST: ${SMTP_HOST:-smtp-mail.outlook.com}
      AIRFLOW__SMTP__SMTP_PORT: ${SMTP_PORT:-587}
      AIRFLOW__SMTP__SMTP_USER: ${SMTP_USER:-logistica-alerts@outlook.com}
      AIRFLOW__SMTP__SMTP_PASSWORD: ${SMTP_PASSWORD:-CHANGE_ME}
    volumes:
      - ./airflow:/opt/airflow
      - ./jobs:/jobs
      - ./ingesta:/ingesta
    networks:
      - logistica-net

volumes:
  hdfs_data:
  cassandra_data:
  postgres_data:

networks:
  logistica-net:
    driver: bridge
